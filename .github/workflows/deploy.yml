# Builds and deploys the Docusaurus documentation site to GitHub Pages.
# Validation (docs build check + mobile checks) is handled by ci.yml.

name: Deploy Docs

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    defaults:
      run:
        working-directory: documentation

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: documentation/yarn.lock

      - name: Create or verify gh-pages branch
        working-directory: ${{ github.workspace }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            echo "gh-pages branch already exists."
          else
            echo "gh-pages branch does not exist. Creating it now."
            git checkout --orphan gh-pages
            git reset --hard
            echo "Placeholder for gh-pages branch" > .gitkeep
            git add .gitkeep
            git commit -m "chore(gh-pages): initial gh-pages placeholder"
            git push origin gh-pages
            git checkout main
          fi

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Dependencies Page
        if: github.repository_owner == 'applebaumian'
        run: node scripts/generate-dependencies.js

      - name: Build Docs
        run: yarn build

      - name: Deploy to GitHub Pages
        env:
          ORG_NAME: ${{ github.repository_owner }}
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          NODE_ENV="production" \
          GIT_USER="github-actions[bot]" \
          GIT_PASS="${{ secrets.GITHUB_TOKEN }}" \
          yarn deploy
